name: Quant-Stream Lint and Test

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black flake8 mypy numpy pandas plotly pyarrow pyyaml streamlit

      - name: Compile
        run: python -m compileall automation_runner.py state_sync.py dashboard.py src

      - name: Black formatting check
        run: python -m black --check --line-length 120 automation_runner.py state_sync.py dashboard.py src

      - name: Flake8 lint
        run: python -m flake8 --max-line-length 120 automation_runner.py state_sync.py dashboard.py src

      - name: Mypy focused modules
        run: python -m mypy --ignore-missing-imports --explicit-package-bases automation_runner.py state_sync.py src
