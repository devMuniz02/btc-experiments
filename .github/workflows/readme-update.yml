name: readme-update

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["prod"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: readme-update
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python src/workflows/update_readme.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README is already current."
            exit 0
          fi
          git commit -m "Update public results snapshot"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase
          done
          exit 1
