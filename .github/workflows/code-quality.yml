name: Code Quality

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install runtime and CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest coverage pip-audit

      - name: Validate dependency graph
        run: python -m pip check

      - name: Audit dependency vulnerabilities
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Verify Python compilation
        run: python -m compileall scripts src tests

      - name: Lint for hard code errors
        run: python -m ruff check scripts src tests --select E9,F63,F7,F82 --output-format=github

      - name: Verify formatting on maintained control-plane surface
        run: python -m ruff format --check scripts/azure_train_request_job.py scripts/train.py src/utils/azure_ml.py src/utils/market_hours.py src/utils/path_config.py tests/test_azure_ml.py tests/test_train_requests.py

      - name: Lint maintained control-plane surface
        run: python -m ruff check scripts/azure_train_request_job.py scripts/train.py src/utils/azure_ml.py src/utils/market_hours.py src/utils/path_config.py tests/test_azure_ml.py tests/test_train_requests.py --select I,UP --output-format=github

      - name: Type check maintained utility modules
        run: python -m mypy src/utils/azure_ml.py src/utils/market_hours.py src/utils/path_config.py

      - name: Run unit tests
        run: python -m coverage run -m pytest

      - name: Report focused coverage
        run: python -m coverage report

      - name: Smoke test canonical CLI
        run: |
          python scripts/train.py --help
          python scripts/train.py train --help
          python scripts/train.py reeval --help
          python scripts/train.py report --help
          python scripts/train.py migrate --help
          python scripts/train.py request-run --help
          python scripts/train.py request-reconcile --help
