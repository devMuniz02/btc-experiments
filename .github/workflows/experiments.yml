name: experiments

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      max_requests:
        default: "25"
        required: true
        description: "Maximum experiment requests to process in this run"
      auto_continue:
        default: "true"
        required: true
        description: "Dispatch another run when requests remain"

permissions:
  actions: write
  contents: write

concurrency:
  group: quant-experiments-single-market
  cancel-in-progress: false

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-workflow.txt
      - run: pip install "torch>=2.0" --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements-workflow.txt
      - run: python scripts/pull_private_src.py --required --clean
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE || 'model' }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: python scripts/run_experiments_workflow.py --push-github --github-branch experiments --push-hf --max-requests "${{ inputs.max_requests || '25' }}" --result-file private_hf_cache/experiment-result.json
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE || 'model' }}
      - name: Inspect experiment result
        id: result
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result_path = Path("private_hf_cache/experiment-result.json")
          result = json.loads(result_path.read_text(encoding="utf-8"))
          remaining = result.get("remaining_requests") or []
          should_continue = bool(remaining) and result.get("status") != "blocked"
          completed_phase = str(result.get("completed_phase") or "").lower()
          phase_completed = bool(result.get("phase_advanced") or completed_phase)
          workflow_done = (
              result.get("status") == "completed"
              and result.get("current_phase") == "done"
              and completed_phase in {"phase16", "16"}
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_continue={str(should_continue).lower()}\n")
              output.write(f"phase_completed={str(phase_completed).lower()}\n")
              output.write(f"workflow_done={str(workflow_done).lower()}\n")

          print(f"remaining_requests={len(remaining)}")
          PY
      - name: Update Pages and README after phase completion
        if: ${{ steps.result.outputs.phase_completed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dispatch_optional() {
            workflow="$1"
            output="$(gh workflow run "$workflow" --ref main 2>&1)" && return 0
            if printf '%s' "$output" | grep -qi "disabled workflow"; then
              echo "::warning title=Workflow dispatch skipped::$workflow is disabled; enable it in GitHub Actions to allow automatic reporting updates."
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }
          dispatch_optional pages-update.yml
          dispatch_optional readme-update.yml
      - name: Start production after phase 16
        if: ${{ steps.result.outputs.workflow_done == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run prod.yml --ref main -f max_markets=100
      - name: Dispatch next experiment run
        if: ${{ steps.result.outputs.should_continue == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.auto_continue == 'true') || github.event_name == 'schedule') }}
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_REQUESTS: ${{ inputs.max_requests || '25' }}
        run: gh workflow run experiments.yml --ref main -f max_requests="$MAX_REQUESTS" -f auto_continue=true
