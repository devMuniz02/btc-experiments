name: post-lock-validation

on:
  workflow_dispatch:
    inputs:
      market:
        default: ""
        required: false
        description: "Optional market id. Leave empty to rerun all exhaustive markets."

permissions:
  actions: write
  contents: write

concurrency:
  group: quant-post-lock-validation
  cancel-in-progress: false

jobs:
  rerun-post-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-workflow.txt
      - run: pip install "torch>=2.0" --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements-workflow.txt
      - run: python scripts/pull_private_src.py --required --clean
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE || 'model' }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - run: python scripts/run_experiments_workflow.py --post-lock-only --push-github --github-branch experiments --push-hf --market "${{ inputs.market || '' }}" --result-file private_hf_cache/post-lock-result.json
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE || 'model' }}
      - name: Update Pages and README
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dispatch_optional() {
            workflow="$1"
            output="$(gh workflow run "$workflow" --ref main 2>&1)" && return 0
            if printf '%s' "$output" | grep -qi "disabled workflow"; then
              echo "::warning title=Workflow dispatch skipped::$workflow is disabled; enable it in GitHub Actions to allow automatic reporting updates."
              return 0
            fi
            printf '%s\n' "$output" >&2
            return 1
          }
          dispatch_optional pages-update.yml
          dispatch_optional readme-update.yml
