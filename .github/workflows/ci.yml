name: ci

on:
  push:
  pull_request:

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-ci.txt
            requirements-workflow.txt
      - run: pip install "torch>=2.0" --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements-ci.txt
      - run: python scripts/run_public_audit.py
      - run: python scripts/pull_private_src.py --required --clean
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE || 'model' }}
      - run: python -m pytest
      - run: python scripts/run_full_train.py --request config/config.example.yaml --dry-run
